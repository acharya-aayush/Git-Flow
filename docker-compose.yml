version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: gitflow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vault
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
